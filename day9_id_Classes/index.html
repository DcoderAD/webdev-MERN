<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>id and classes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- id must be unique -->
    <!-- one element can have multiple classes  and one class can be assign to multiple elements too -->
    <!-- if you are giving multiple class to one element you can do it by giving space in the name of classes -->
    <div id="div1" class="red yellow">div1</div>
    <div id="div2">div2</div>
    <span id="span1">span1</span>
  </body>
</html>
